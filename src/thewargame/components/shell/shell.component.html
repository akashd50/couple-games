<div class="shell">
    <header class="shell__topbar">
        <a routerLink="/" class="shell__back" aria-label="Back to home">←</a>
        <div class="shell__title">The War Game</div>
        <wg-clock-bar class="shell__clock"/>
    </header>

    <main class="shell__main">
        <wg-map-view class="shell__map"/>
        <aside class="shell__side" aria-label="Command panel">
            <wg-side-panel class="shell__panel"/>
        </aside>
    </main>

    <footer class="shell__ticker" aria-label="News ticker">
        <wg-news-ticker/>
    </footer>

    <wg-build-dialog/>
    <wg-hub-info-dialog/>
    <wg-tech-tree-dialog/>
</div>
