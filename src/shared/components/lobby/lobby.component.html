<div class="sg-lobby">
    <h1 class="sg-title">Game Lobby</h1>

    @if (!roomCode()) {
        <div class="sg-actions">
            <div class="flex-row">
                @for (item of players; track $index) {
                    <button class="sg-btn sg-btn-primary" [class.selected]="selectedMaxPlayers === item"
                            (click)="setMaxPlayers(item)">{{ item + "" }}
                    </button>
                }
            </div>
            <button class="sg-btn sg-btn-primary" (click)="createRoom()">Create Room</button>
            <div class="sg-divider">— or —</div>
            <div class="sg-join">
                <input
                        type="text"
                        class="sg-input"
                        placeholder="Enter room code"
                        [(ngModel)]="joinCode"
                        maxlength="4"
                        (keyup.enter)="joinRoom()"
                />
                <button class="sg-btn" (click)="joinRoom()" [disabled]="joinCode.length !== 4">Join</button>
            </div>
        </div>
    }

    @if (roomCode()) {
        <div class="sg-room">
            <div class="sg-code-box">Room: <span class="sg-code-value">{{ roomCode() }}</span></div>
            <p class="sg-invite">Share this code to invite</p>

            <div class="sg-pick-slot">
                <p>Choose your slot:</p>
                @for (item of players; track $index) {
                    @let pId = `player${item}`;
                    <button
                            class="sg-btn"
                            [ngClass]="isReady() && player().role === pId ? 'sg-btn-ready' : []"
                            [disabled]="pReady()[pId]"
                            (click)="player().role === pId ? readyUp() : pickSlot(pId)"
                    >{{ isReady() && player().role === pId ? "Ready" : player().role === pId ? "Ready up" : "Select Player " + item }}
                    </button>
                }
            </div>
        </div>
    }
</div>
