<div class="sg-lobby">
    <h1 class="sg-title">Sling War</h1>
    <p class="sg-subtitle">Build. Trivia. Destroy.</p>

    @if (!roomCode()) {
        <div class="sg-actions">
            <button class="sg-btn sg-btn-primary" (click)="createRoom()">Create Room</button>
            <div class="sg-divider">— or —</div>
            <div class="sg-join">
                <input
                        type="text"
                        class="sg-input"
                        placeholder="Enter room code"
                        [(ngModel)]="joinCode"
                        maxlength="4"
                        (keyup.enter)="joinRoom()"
                />
                <button class="sg-btn" (click)="joinRoom()" [disabled]="joinCode.length !== 4">Join</button>
            </div>
        </div>
    }

    @if (roomCode()) {
        <div class="sg-room">
            <div class="sg-code-box">Room: <span class="sg-code-value">{{ roomCode() }}</span></div>
            <p class="sg-invite">Share this code with your opponent</p>

            <div class="sg-pick-slot">
                <p>Choose your slot:</p>
                <button
                        class="sg-btn"
                        [ngClass]="isReady() && player().role === 'player1' ? 'sg-btn-ready' : []"
                        [disabled]="p1Ready()"
                        (click)="player().role === 'player1' ? readyUp() : pickSlot('player1')"
                >{{ isReady() && player().role === 'player1' ? "Ready" : player().role === 'player1' ? "Ready up" : "Select Player 1" }}
                </button>
                <button
                        class="sg-btn"
                        [ngClass]="isReady() &&player().role === 'player2' ? 'sg-btn-ready' : []"
                        [disabled]="p2Ready()"
                        (click)="player().role === 'player2' ? readyUp() : pickSlot('player2')"
                >{{ isReady() && player().role === 'player2' ? "Ready" : player().role === 'player2' ? "Ready up" : "Select Player 2" }}
                </button>
            </div>
        </div>
    }
</div>
